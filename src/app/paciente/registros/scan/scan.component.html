@if (qrRegistro) {
    <section class="panel__main--center">
            <app-label
                [size]="isMobile ? 'md' : 'lg'"
                [prefix]="'Autoregistro'"
                [label]="'Escáner QR'"
                [subtitle]="'Luego de escanear, se autocompletará el formulario.'"
                severity="neutral"
                direction="column">
            </app-label>

            @if (!noPermissions) {
                <span class="qr__wrapper">
                    <zxing-scanner 
                        [torch]="torchEnabled" 
                        [(device)]="currentDevice"
                        [autofocusEnabled]="true"
                        (scanSuccess)="onCodeResult($event)"
                        [formats]="formatsEnabled" 
                        [tryHarder]="tryHarder" 
                        (permissionResponse)="onHasPermission($event)"
                        (camerasFound)="onCamerasFound($event)" 
                        (torchCompatible)="onTorchCompatible($event)"
                        style="width: 320px; height: 320px; display: block;">
                    </zxing-scanner>
                    <div class="qr__overlay"></div>
                    <div class="qr__line"></div>
                </span>
            }

        @if (!isMobile && noPermissions) {
            <app-card
                aligned="center"
                size="lg"
                direction="row"
                [variant]="'fill'"
                bottom="20px"
                [severity]="'danger'"
                [closable]="true">
                <app-label
                    size="xxs"
                    label="Activá la cámara"
                    subtitle="Puedes habilitar los permisos desde el navegador."
                    [icon]="'triangle-exclamation'"
                    variant="outline"
                    direction="row"
                    severity="danger">
                </app-label>
            </app-card>
        }

        @if (isMobile && noPermissions) {
            <app-card
                aligned="center"
                size="lg"
                direction="row"
                [variant]="'fill'"
                bottom="20px"
                [severity]="'danger'"
                [closable]="true">
                <app-label
                    size="xxs"
                    label="Activá la cámara"
                    subtitle="Puedes habilitar los permisos desde el navegador."
                    [icon]="'triangle-exclamation'"
                    variant="outline"
                    direction="row"
                    severity="danger">
                </app-label>
            </app-card>
        }

        @if (!isMobile && !noPermissions) {
            <app-card
                aligned="center"
                size="lg"
                direction="row"
                [variant]="'fill'"
                bottom="20px"
                [severity]="'success'"
                [closable]="true">
                <app-label
                    size="xxs"
                    label="Mantén el código firme"
                    subtitle="Si el código QR no es detectado, vuelve a intentarlo.."
                    [icon]="'info-circle'"
                    variant="outline"
                    direction="row"
                    severity="success">
                </app-label>
            </app-card>
        }

        @if (isMobile) {
            <app-card
                size="lg"
                direction="row"
                [variant]="'fill'"
                bottom="20px"
                [severity]="'success'"
                [closable]="true">
                <app-label
                    size="xxs"
                    label="Mantén el teléfono estable"
                    subtitle="Si el código QR no es detectado, vuelve a intentarlo."
                    [icon]="'info-circle'"
                    variant="outline"
                    direction="row"
                    severity="success">
                </app-label>
            </app-card>
        }

        <footer class="panel__footer">
            <app-button
                size="xxs"
                severity="danger"
                [variant]="'outline'"
                [direction]="'row'"
                [icon]="'close'"
                [label]="'Cancelar'"
                (clickEvent)="cancel()"
                >
            </app-button>
            <app-button
                size="xxs"
                severity="success"
                [variant]="'fill'"
                [direction]="'row'"
                icon="pencil"
                [label]="'Registro manual'"
                (clickEvent)="goToRegistro()"
                >
            </app-button>
        </footer>
    </section>
}
